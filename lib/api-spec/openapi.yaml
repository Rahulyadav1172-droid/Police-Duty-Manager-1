openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Ayodhya Police Duty Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: personnel
    description: Police personnel management
  - name: duty-points
    description: Duty point locations
  - name: roster
    description: Duty roster/assignment management
  - name: leave
    description: Personnel leave and absence management
  - name: biometric
    description: Biometric machine attendance records
  - name: events
    description: Special events and festival duty management
  - name: mess-bookings
    description: Officer's Mess / Smart Cell accommodation bookings
  - name: employee-profiles
    description: SSP Office employee profile management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /personnel:
    get:
      operationId: listPersonnel
      tags: [personnel]
      summary: List all personnel
      responses:
        "200":
          description: List of all police personnel
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Personnel"
    post:
      operationId: createPersonnel
      tags: [personnel]
      summary: Add a new personnel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PersonnelInput"
      responses:
        "201":
          description: Personnel created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Personnel"
        "400":
          description: Invalid input

  /personnel/{id}:
    get:
      operationId: getPersonnel
      tags: [personnel]
      summary: Get a single personnel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Personnel found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Personnel"
        "404":
          description: Not found
    patch:
      operationId: updatePersonnel
      tags: [personnel]
      summary: Update personnel details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PersonnelUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Personnel"
        "404":
          description: Not found
    delete:
      operationId: deletePersonnel
      tags: [personnel]
      summary: Delete personnel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /duty-points:
    get:
      operationId: listDutyPoints
      tags: [duty-points]
      summary: List all duty points
      responses:
        "200":
          description: List of duty points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DutyPoint"
    post:
      operationId: createDutyPoint
      tags: [duty-points]
      summary: Create a new duty point
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DutyPointInput"
      responses:
        "201":
          description: Duty point created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DutyPoint"
        "400":
          description: Invalid input

  /duty-points/{id}:
    patch:
      operationId: updateDutyPoint
      tags: [duty-points]
      summary: Update a duty point
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DutyPointUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DutyPoint"
        "404":
          description: Not found
    delete:
      operationId: deleteDutyPoint
      tags: [duty-points]
      summary: Delete a duty point
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /roster:
    get:
      operationId: listRoster
      tags: [roster]
      summary: List all duty assignments
      responses:
        "200":
          description: Full roster
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RosterEntry"
    post:
      operationId: assignDuty
      tags: [roster]
      summary: Assign duty to a personnel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RosterInput"
      responses:
        "201":
          description: Duty assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RosterEntry"
        "400":
          description: Invalid input or personnel already on duty

  /roster/live:
    get:
      operationId: getLiveBoard
      tags: [roster]
      summary: Get live duty board (on duty vs available)
      responses:
        "200":
          description: Live duty board
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveBoard"

  /roster/stats:
    get:
      operationId: getRosterStats
      tags: [roster]
      summary: Get roster statistics summary
      responses:
        "200":
          description: Duty stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RosterStats"

  /roster/{id}:
    get:
      operationId: getRosterEntry
      tags: [roster]
      summary: Get a single roster entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Roster entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RosterEntry"
        "404":
          description: Not found
    patch:
      operationId: updateRosterEntry
      tags: [roster]
      summary: Update a roster entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RosterUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RosterEntry"
        "404":
          description: Not found

  /roster/{id}/release:
    post:
      operationId: releaseFromDuty
      tags: [roster]
      summary: Release a personnel from duty (especially unlimited duty)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Released
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RosterEntry"
        "404":
          description: Not found
        "400":
          description: Already released

  /leave:
    get:
      operationId: listLeave
      tags: [leave]
      summary: List all leave records
      parameters:
        - name: personnelId
          in: query
          required: false
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, approved, rejected]
      responses:
        "200":
          description: List of leave records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaveRecord"
    post:
      operationId: createLeave
      tags: [leave]
      summary: Create a new leave record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeaveInput"
      responses:
        "201":
          description: Leave record created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveRecord"
        "400":
          description: Invalid input

  /leave/active-today:
    get:
      operationId: getActiveLeavesToday
      tags: [leave]
      summary: Get all personnel currently on leave today
      responses:
        "200":
          description: Personnel on leave today
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaveRecord"

  /biometric/punch:
    post:
      operationId: recordBiometricPunch
      tags: [biometric]
      summary: Record a biometric punch (IN or OUT) by belt number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BiometricPunchInput"
      responses:
        "201":
          description: Punch recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BiometricRecord"
        "400":
          description: Invalid input or belt number not found

  /biometric/records:
    get:
      operationId: listBiometricRecords
      tags: [biometric]
      summary: List biometric punch records (optionally filtered by date)
      parameters:
        - name: date
          in: query
          required: false
          description: "Filter by date (YYYY-MM-DD). Defaults to today."
          schema:
            type: string
        - name: personnelId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of biometric punch records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BiometricRecord"

  /biometric/today:
    get:
      operationId: getBiometricToday
      tags: [biometric]
      summary: Get today's biometric summary per personnel (first IN, last OUT, hours worked)
      responses:
        "200":
          description: Today's attendance summary from biometric machine
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BiometricDailySummary"

  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List all special events
      responses:
        "200":
          description: List of special events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create a special event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "400":
          description: Invalid input

  /events/{id}:
    patch:
      operationId: updateEvent
      tags: [events]
      summary: Update a special event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "404":
          description: Not found
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete a special event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /mess-bookings:
    get:
      operationId: listMessBookings
      tags: [mess-bookings]
      summary: List all mess bookings
      responses:
        "200":
          description: All mess bookings sorted by check-in date descending
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MessBooking"
    post:
      operationId: createMessBooking
      tags: [mess-bookings]
      summary: Create a new mess booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessBookingInput"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessBooking"
        "400":
          description: Invalid input

  /mess-bookings/{id}:
    put:
      operationId: updateMessBooking
      tags: [mess-bookings]
      summary: Update a mess booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessBookingInput"
      responses:
        "200":
          description: Updated booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessBooking"
        "400":
          description: Invalid input
        "404":
          description: Not found
    delete:
      operationId: deleteMessBooking
      tags: [mess-bookings]
      summary: Delete a mess booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /roster/rotation:
    get:
      operationId: getRosterRotation
      tags: [roster]
      summary: Get duty rotation fairness data (last duty per personnel)
      responses:
        "200":
          description: Rotation data sorted by last duty date ascending
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RotationEntry"

  /roster/trends:
    get:
      operationId: getRosterTrends
      tags: [roster]
      summary: Get daily duty count trends for the last N days
      parameters:
        - name: days
          in: query
          required: false
          description: "Number of past days to include. Defaults to 7."
          schema:
            type: integer
      responses:
        "200":
          description: Daily trend data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrendEntry"

  /biometric/records/{id}:
    delete:
      operationId: deleteBiometricRecord
      tags: [biometric]
      summary: Delete a biometric punch record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /leave/{id}:
    get:
      operationId: getLeave
      tags: [leave]
      summary: Get a single leave record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Leave record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveRecord"
        "404":
          description: Not found
    put:
      operationId: updateLeave
      tags: [leave]
      summary: Update a leave record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeaveInput"
      responses:
        "200":
          description: Updated leave record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveRecord"
        "404":
          description: Not found
    delete:
      operationId: deleteLeave
      tags: [leave]
      summary: Delete a leave record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /employee-profiles:
    get:
      operationId: listEmployeeProfiles
      tags: [employee-profiles]
      summary: List all employee profiles
      parameters:
        - name: pno
          in: query
          schema:
            type: string
          description: Filter by PNO number (exact match)
      responses:
        "200":
          description: List of employee profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmployeeProfile"
    post:
      operationId: createEmployeeProfile
      tags: [employee-profiles]
      summary: Create a new employee profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeProfileInput"
      responses:
        "201":
          description: Profile created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeProfile"
        "400":
          description: Invalid input
        "409":
          description: PNO already exists

  /employee-profiles/{id}:
    get:
      operationId: getEmployeeProfile
      tags: [employee-profiles]
      summary: Get employee profile by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Employee profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeProfile"
        "404":
          description: Not found
    put:
      operationId: updateEmployeeProfile
      tags: [employee-profiles]
      summary: Update employee profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeProfileInput"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeProfile"
        "404":
          description: Not found
    delete:
      operationId: deleteEmployeeProfile
      tags: [employee-profiles]
      summary: Delete an employee profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Personnel:
      type: object
      required: [id, name, beltNumber, mobileNumber, rank, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        beltNumber:
          type: string
        mobileNumber:
          type: string
        rank:
          type: string
          enum: [Constable, Head Constable, Sub-Inspector, Inspector]
        createdAt:
          type: string
          format: date-time

    PersonnelInput:
      type: object
      required: [name, beltNumber, mobileNumber, rank]
      properties:
        name:
          type: string
          minLength: 1
        beltNumber:
          type: string
          minLength: 1
        mobileNumber:
          type: string
          minLength: 10
        rank:
          type: string
          enum: [Constable, Head Constable, Sub-Inspector, Inspector]

    PersonnelUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        beltNumber:
          type: string
          minLength: 1
        mobileNumber:
          type: string
          minLength: 10
        rank:
          type: string
          enum: [Constable, Head Constable, Sub-Inspector, Inspector]

    DutyPoint:
      type: object
      required: [id, name, location, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        location:
          type: string
        description:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    DutyPointInput:
      type: object
      required: [name, location]
      properties:
        name:
          type: string
          minLength: 1
        location:
          type: string
          minLength: 1
        description:
          type: string

    DutyPointUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        location:
          type: string
          minLength: 1
        description:
          type: string

    RosterEntry:
      type: object
      required: [id, personnelId, dutyPointId, dutyType, startDateTime, status, createdAt]
      properties:
        id:
          type: integer
        personnelId:
          type: integer
        dutyPointId:
          type: integer
        dutyType:
          type: string
          enum: [unlimited, fixed]
        startDateTime:
          type: string
          format: date-time
        endDateTime:
          type: ["string", "null"]
          format: date-time
        status:
          type: string
          enum: [active, released, expired]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        personnel:
          $ref: "#/components/schemas/Personnel"
        dutyPoint:
          $ref: "#/components/schemas/DutyPoint"

    RosterInput:
      type: object
      required: [personnelId, dutyPointId, dutyType, startDateTime]
      properties:
        personnelId:
          type: integer
        dutyPointId:
          type: integer
        dutyType:
          type: string
          enum: [unlimited, fixed]
        startDateTime:
          type: string
          format: date-time
        endDateTime:
          type: string
          format: date-time
        notes:
          type: string

    RosterUpdate:
      type: object
      properties:
        dutyPointId:
          type: integer
        dutyType:
          type: string
          enum: [unlimited, fixed]
        startDateTime:
          type: string
          format: date-time
        endDateTime:
          type: string
          format: date-time
        notes:
          type: string
        status:
          type: string
          enum: [active, released, expired]

    LiveBoard:
      type: object
      required: [onDuty, available, totalPersonnel, totalDutyPoints]
      properties:
        onDuty:
          type: array
          items:
            $ref: "#/components/schemas/RosterEntry"
        available:
          type: array
          items:
            $ref: "#/components/schemas/Personnel"
        totalPersonnel:
          type: integer
        totalDutyPoints:
          type: integer

    RosterStats:
      type: object
      required: [totalOnDuty, totalAvailable, totalPersonnel, unlimitedDuty, fixedDuty, byRank]
      properties:
        totalOnDuty:
          type: integer
        totalAvailable:
          type: integer
        totalPersonnel:
          type: integer
        unlimitedDuty:
          type: integer
        fixedDuty:
          type: integer
        byRank:
          type: array
          items:
            $ref: "#/components/schemas/RankStat"

    RankStat:
      type: object
      required: [rank, onDuty, available, total]
      properties:
        rank:
          type: string
        onDuty:
          type: integer
        available:
          type: integer
        total:
          type: integer

    LeaveRecord:
      type: object
      required: [id, personnelId, leaveType, startDate, endDate, status, createdAt]
      properties:
        id:
          type: integer
        personnelId:
          type: integer
        leaveType:
          type: string
          enum: [sick_leave, earned_leave, casual_leave, absent]
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        reason:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, approved, rejected]
        createdAt:
          type: string
          format: date-time
        personnel:
          $ref: "#/components/schemas/Personnel"

    BiometricPunchInput:
      type: object
      required: [beltNumber, punchType]
      properties:
        beltNumber:
          type: string
          minLength: 1
          description: Belt number (PNO) of the personnel as registered in the machine
        punchType:
          type: string
          enum: [IN, OUT]
        punchTime:
          type: string
          format: date-time
          description: Timestamp from the machine; defaults to current server time if omitted
        deviceId:
          type: string
          description: Optional identifier of the biometric device

    BiometricRecord:
      type: object
      required: [id, personnelId, punchTime, punchType, createdAt]
      properties:
        id:
          type: integer
        personnelId:
          type: integer
        punchTime:
          type: string
          format: date-time
        punchType:
          type: string
          enum: [IN, OUT]
        deviceId:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        personnel:
          $ref: "#/components/schemas/Personnel"

    BiometricDailySummary:
      type: object
      required: [personnelId, personnel, punches]
      properties:
        personnelId:
          type: integer
        personnel:
          $ref: "#/components/schemas/Personnel"
        firstIn:
          type: ["string", "null"]
          format: date-time
